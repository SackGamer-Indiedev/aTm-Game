<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>aTm Game</title>
<style>
  :root{
    --bg1:#f5f1eb;
    --bg2:#e7ddd2;
    --text:#46433f;
    --text-soft:#9a948c;
    --accent:#8fb6a3;
    --accent-soft:rgba(143,182,163,0.22);
    --accent2:#d9a988;
    --surface:#ffffff;
    --ring:#8fb6a3;
    --transition-theme: background 0.8s ease, color 0.8s ease;
  }
  body.dark{
    --bg1:#1f242b;
    --bg2:#151920;
    --text:#e9e5df;
    --text-soft:#8d8a85;
    --accent:#7eab98;
    --accent-soft:rgba(126,171,152,0.22);
    --accent2:#c9906f;
    --surface:#2a313a;
    --ring:#7eab98;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; }
  body{
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    transition: var(--transition-theme);
    height:100vh;
    width:100vw;
    position:relative;
  }
  #app{ position:absolute; inset:0; }
  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition: opacity 0.7s ease;
    text-align:center;
    padding: 24px;
  }
  .screen.active{ opacity:1; pointer-events:auto; }

  /* Loading */
  #loading-screen .logo{
    font-size: 2.4rem;
    font-weight:300;
    letter-spacing: 0.35em;
    color: var(--accent);
    animation: breathe 2.2s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{ opacity:0.35; transform:scale(0.96); }
    50%{ opacity:1; transform:scale(1.04); }
  }

  /* Home */
  #home-screen h1{
    font-size: 2.6rem;
    font-weight: 200;
    letter-spacing: 0.18em;
    margin: 0 0 4px 0;
    color: var(--text);
  }
  #home-screen p.tag{
    color: var(--text-soft);
    font-size: 0.95rem;
    margin: 0 0 48px 0;
    letter-spacing: 0.06em;
    font-weight:300;
  }
  .menu{ display:flex; flex-direction:column; gap: 16px; width: 220px; }
  .btn{
    border: none;
    background: var(--surface);
    color: var(--text);
    padding: 16px 24px;
    border-radius: 999px;
    font-size: 1rem;
    font-weight:400;
    letter-spacing: 0.1em;
    cursor:pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.4s ease;
  }
  .btn:hover{ transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
  .btn:active{ transform: translateY(0px) scale(0.98); }
  .btn.primary{ background: var(--accent); color: #fff; }

  /* Settings */
  #settings-screen h2{ font-weight:300; letter-spacing:0.18em; margin-bottom: 40px; }
  .setting-row{
    display:flex; align-items:center; justify-content:space-between;
    width: 260px; margin-bottom: 22px;
    font-size: 0.95rem; letter-spacing: 0.05em;
    color: var(--text);
  }
  .switch{
    position:relative; width:50px; height:28px; border-radius:999px;
    background: var(--accent-soft);
    cursor:pointer; transition: background 0.3s ease;
    flex-shrink:0;
  }
  .switch::after{
    content:''; position:absolute; top:3px; left:3px;
    width:22px; height:22px; border-radius:50%;
    background: var(--surface);
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    transition: transform 0.3s ease;
  }
  .switch.on{ background: var(--accent); }
  .switch.on::after{ transform: translateX(22px); }

  /* Game */
  #game-screen{ touch-action: none; cursor:pointer; }
  #exit-btn{
    position:absolute; top:18px; right:20px;
    width:36px; height:36px; border-radius:50%;
    border:none; background:transparent; color: var(--text-soft);
    font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition: background 0.2s ease, color 0.2s ease;
    z-index: 5;
  }
  #exit-btn:hover{ background: var(--accent-soft); color: var(--text); }

  #number-display{
    font-size: 6.5rem;
    font-weight: 200;
    color: var(--text);
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.6s ease, transform 0.6s ease;
    letter-spacing: 0.05em;
  }
  #number-display.show{ opacity:1; transform: scale(1); }

  #center-visual{
    position:relative;
    width: 220px; height: 220px;
    display:flex; align-items:center; justify-content:center;
  }

  #breathing-circle{
    position:absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: var(--accent-soft);
    opacity:0;
    transform: scale(0.8);
  }
  #breathing-circle.show{
    animation: breatheCircle 3.6s ease-in-out;
  }
  @keyframes breatheCircle{
    0%{ opacity:0; transform: scale(0.7); }
    20%{ opacity:1; transform: scale(1.15); }
    50%{ opacity:1; transform: scale(0.85); }
    80%{ opacity:1; transform: scale(1.05); }
    100%{ opacity:0; transform: scale(0.9); }
  }

  #glow-circle{
    position:absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-soft), transparent 70%);
    opacity:0;
    transform: scale(0.6);
  }
  #glow-circle.show{
    animation: glowPulse 1.6s ease-out;
  }
  @keyframes glowPulse{
    0%{ opacity:0; transform: scale(0.5); }
    35%{ opacity:1; transform: scale(1.25); }
    100%{ opacity:0; transform: scale(1.5); }
  }

  #message-display{
    position:absolute; bottom: 14%; left:0; right:0;
    text-align:center;
    font-size: 1rem;
    font-weight:300;
    color: var(--text-soft);
    letter-spacing: 0.04em;
    opacity:0;
    transition: opacity 0.8s ease;
    padding: 0 36px;
    line-height:1.6;
  }
  #message-display.show{ opacity:1; }

  /* Ripple for quick taps */
  .ripple{
    position:absolute;
    width: 18px; height:18px;
    border-radius:50%;
    background: var(--accent);
    opacity:0.35;
    transform: translate(-50%,-50%) scale(0.4);
    pointer-events:none;
    animation: rippleAnim 0.5s ease-out forwards;
  }
  @keyframes rippleAnim{
    0%{ opacity:0.35; transform: translate(-50%,-50%) scale(0.4); }
    100%{ opacity:0; transform: translate(-50%,-50%) scale(3.2); }
  }

  /* Hold ring + ambient glow */
  .hold-ring{
    position:absolute;
    transform: translate(-50%,-50%);
    pointer-events:none;
  }
  .hold-ring.fading{ transition: opacity 0.35s ease; opacity:0; }

  .ring-glow{
    position:absolute;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-soft), transparent 72%);
    transform: translate(-50%,-50%) scale(1);
    opacity: 0.12;
    pointer-events:none;
  }
  .ring-glow.fading{ transition: opacity 0.35s ease; opacity:0; }

  /* Goodbye overlay */
  #goodbye-screen p{
    font-size: 1.05rem; color: var(--text-soft);
    max-width: 320px; line-height:1.7; margin-bottom: 32px; font-weight:300;
  }
</style>
</head>
<body>
<div id="app">

  <div id="loading-screen" class="screen active">
    <div class="logo">STILLCOUNT</div>
  </div>

  <div id="home-screen" class="screen">
    <h1>STILLCOUNT</h1>
    <p class="tag">a quiet place to count</p>
    <div class="menu">
      <button class="btn primary" id="start-btn">Start</button>
      <button class="btn" id="settings-btn">Settings</button>
      <button class="btn" id="quit-btn">Quit</button>
    </div>
  </div>

  <div id="settings-screen" class="screen">
    <h2>SETTINGS</h2>
    <div class="setting-row">
      <span>Sound</span>
      <div class="switch on" id="sound-switch"></div>
    </div>
    <div class="setting-row">
      <span>Dark theme</span>
      <div class="switch" id="theme-switch"></div>
    </div>
    <button class="btn" id="back-btn" style="margin-top:24px;">Back</button>
  </div>

  <div id="game-screen" class="screen">
    <button id="exit-btn">×</button>
    <div id="center-visual">
      <div id="breathing-circle"></div>
      <div id="glow-circle"></div>
      <div id="number-display"></div>
    </div>
    <div id="message-display"></div>
  </div>

  <div id="goodbye-screen" class="screen">
    <h2 style="font-weight:300; letter-spacing:0.18em;">TAKE CARE</h2>
    <p>Thank you for taking a quiet moment for yourself. You can return anytime.</p>
    <button class="btn primary" id="return-btn">Return Home</button>
  </div>

</div>

<script>
(function(){
  const screens = {
    loading: document.getElementById('loading-screen'),
    home: document.getElementById('home-screen'),
    settings: document.getElementById('settings-screen'),
    game: document.getElementById('game-screen'),
    goodbye: document.getElementById('goodbye-screen'),
  };

  function showScreen(name){
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  // ---------- State ----------
  const state = {
    difficulty: 1,       // invisible adaptive difficulty, no on-screen number
    target: 0,
    count: 0,
    flashDuration: 5500,
    soundOn: true,
    phase: 'idle',        // idle | flashing | counting | result
    activePointerId: null,
    stopTriggered: false,
    holdTimeout: null,
    holdStartTime: null,
  };

  const DIFFICULTY_MIN = 1;
  const DIFFICULTY_MAX = 40;
  const HOLD_MS = 2000;

  // ---------- Audio ----------
  let audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e){ audioCtx = null; }
    }
  }
  function playTone(freq, duration, type, peak){
    if(!state.soundOn || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(peak || 0.1, now + 0.06);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + duration + 0.05);
  }
  function soundAppear(){ playTone(392, 0.5, 'sine', 0.06); }
  function soundMatch(){
    playTone(523.25, 0.45, 'sine', 0.09);
    setTimeout(()=>playTone(659.25, 0.55, 'sine', 0.09), 160);
  }
  function soundNoMatch(){ playTone(220, 1.3, 'sine', 0.06); }

  // ---------- Theme / Settings ----------
  const soundSwitch = document.getElementById('sound-switch');
  const themeSwitch = document.getElementById('theme-switch');

  soundSwitch.addEventListener('click', () => {
    state.soundOn = !state.soundOn;
    soundSwitch.classList.toggle('on', state.soundOn);
  });
  themeSwitch.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    themeSwitch.classList.toggle('on');
  });

  // ---------- Navigation ----------
  document.getElementById('settings-btn').addEventListener('click', () => showScreen('settings'));
  document.getElementById('back-btn').addEventListener('click', () => showScreen('home'));
  document.getElementById('quit-btn').addEventListener('click', () => showScreen('goodbye'));
  document.getElementById('return-btn').addEventListener('click', () => showScreen('home'));
  document.getElementById('exit-btn').addEventListener('click', () => {
    resetRoundVisuals();
    state.phase = 'idle';
    showScreen('home');
  });

  document.getElementById('start-btn').addEventListener('click', () => {
    ensureAudio();
    state.difficulty = 1;
    showScreen('game');
    startRound(false);
  });

  // ---------- Adaptive difficulty ----------
  // Difficulty is invisible to the player. It nudges up after a match,
  // and eases back down after a miss -- the game gently follows you.
  function getTargetRange(difficulty){
    const min = Math.max(2, Math.round(difficulty));
    const max = Math.min(min + 5 + Math.floor(difficulty / 2), 80);
    return { min, max: Math.max(min + 2, max) };
  }
  function getFlashDuration(difficulty){
    // Slow, gentle decrease -- never feels rushed even at higher difficulty.
    return Math.max(1800, 5500 - difficulty * 90);
  }
  function randomTarget(difficulty){
    const { min, max } = getTargetRange(difficulty);
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // ---------- Round flow ----------
  const numberDisplay = document.getElementById('number-display');
  const messageDisplay = document.getElementById('message-display');
  const breathingCircle = document.getElementById('breathing-circle');
  const glowCircle = document.getElementById('glow-circle');
  const gameScreen = document.getElementById('game-screen');

  const noMatchMessages = [
    "That's okay — take a breath. You've got this.",
    "No need to judge. Just breathe, and try again.",
    "The mind wanders sometimes — gently come back.",
    "Take it slow. One more try, with kindness.",
    "Notice, breathe, and begin again — you're doing fine.",
    "Nothing went wrong here. Settle in, and try once more."
  ];

  function startRound(isRetry){
    state.count = 0;
    state.stopTriggered = false;
    state.activePointerId = null;
    if(state.holdTimeout){ clearTimeout(state.holdTimeout); state.holdTimeout = null; }
    if(!isRetry){
      state.target = randomTarget(state.difficulty);
      state.flashDuration = getFlashDuration(state.difficulty);
    }
    messageDisplay.classList.remove('show');
    messageDisplay.textContent = '';
    showNumber();
  }

  function showNumber(){
    state.phase = 'flashing';
    numberDisplay.textContent = state.target;
    numberDisplay.classList.remove('show');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        numberDisplay.classList.add('show');
        soundAppear();
      });
    });

    setTimeout(() => {
      numberDisplay.classList.remove('show');
      setTimeout(() => beginCounting(), 650);
    }, state.flashDuration);
  }

  function beginCounting(){
    state.phase = 'counting';
  }

  function evaluateResult(){
    state.phase = 'result';
    const match = state.count === state.target;
    if(match){
      glowCircle.classList.remove('show');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => glowCircle.classList.add('show'));
      });
      soundMatch();
      state.difficulty = Math.min(state.difficulty + 0.35, DIFFICULTY_MAX);
      setTimeout(() => {
        glowCircle.classList.remove('show');
        startRound(false);
      }, 1700);
    } else {
      breathingCircle.classList.remove('show');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => breathingCircle.classList.add('show'));
      });
      const msg = noMatchMessages[Math.floor(Math.random() * noMatchMessages.length)];
      messageDisplay.textContent = msg;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => messageDisplay.classList.add('show'));
      });
      soundNoMatch();
      state.difficulty = Math.max(state.difficulty - 0.5, DIFFICULTY_MIN);
      setTimeout(() => {
        breathingCircle.classList.remove('show');
        messageDisplay.classList.remove('show');
        startRound(true);
      }, 3600);
    }
  }

  // ---------- Pointer / tap handling ----------
  function spawnRipple(x, y){
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    gameScreen.appendChild(r);
    setTimeout(() => r.remove(), 520);
  }

  let activeRing = null;
  let activeGlow = null;
  let ringAnimFrame = null;
  const RING_R = 28;
  const CIRC = 2 * Math.PI * RING_R;

  function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }

  function spawnRing(x, y){
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('class', 'hold-ring');
    svg.setAttribute('width', '64');
    svg.setAttribute('height', '64');
    svg.setAttribute('viewBox', '0 0 64 64');
    svg.style.left = x + 'px';
    svg.style.top = y + 'px';

    const circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('cx', '32');
    circle.setAttribute('cy', '32');
    circle.setAttribute('r', String(RING_R));
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', 'var(--ring)');
    circle.setAttribute('stroke-width', '4');
    circle.setAttribute('stroke-linecap', 'round');
    circle.setAttribute('stroke-dasharray', String(CIRC));
    circle.setAttribute('stroke-dashoffset', String(CIRC));
    circle.setAttribute('transform', 'rotate(-90 32 32)');
    svg.appendChild(circle);
    gameScreen.appendChild(svg);

    const glow = document.createElement('div');
    glow.className = 'ring-glow';
    glow.style.left = x + 'px';
    glow.style.top = y + 'px';
    gameScreen.appendChild(glow);

    return { svg, circle, glow };
  }

  function animateHold(refs, startTime){
    function frame(now){
      if(state.activePointerId === null) return;
      const elapsed = now - startTime;
      const t = Math.min(elapsed / HOLD_MS, 1);
      const eased = easeOutCubic(t);
      refs.circle.setAttribute('stroke-dashoffset', String(CIRC * (1 - eased)));
      refs.glow.style.opacity = (0.12 + 0.45 * eased).toFixed(3);
      refs.glow.style.transform = 'translate(-50%,-50%) scale(' + (1 + eased * 0.7).toFixed(3) + ')';
      if(t < 1 && state.activePointerId !== null && !state.stopTriggered){
        ringAnimFrame = requestAnimationFrame(frame);
      }
    }
    ringAnimFrame = requestAnimationFrame(frame);
  }

  function removeRing(immediate){
    if(ringAnimFrame){ cancelAnimationFrame(ringAnimFrame); ringAnimFrame = null; }
    if(activeRing){
      const ring = activeRing, glow = activeGlow;
      activeRing = null; activeGlow = null;
      if(immediate){
        ring.remove(); glow.remove();
      } else {
        ring.classList.add('fading');
        glow.classList.add('fading');
        setTimeout(() => { ring.remove(); glow.remove(); }, 360);
      }
    }
  }

  function onPointerDown(e){
    if(state.phase !== 'counting') return;
    if(state.activePointerId !== null) return; // single-touch v1
    state.activePointerId = e.pointerId;
    state.stopTriggered = false;

    const x = e.clientX, y = e.clientY;
    const refs = spawnRing(x, y);
    activeRing = refs.svg;
    activeGlow = refs.glow;
    const startTime = performance.now();
    animateHold(refs, startTime);

    state.holdTimeout = setTimeout(() => {
      if(state.activePointerId === e.pointerId && state.phase === 'counting'){
        state.stopTriggered = true;
        removeRing(true);
        state.activePointerId = null;
        evaluateResult();
      }
    }, HOLD_MS);
  }

  function onPointerUp(e){
    if(state.activePointerId !== e.pointerId) return;
    if(state.holdTimeout){ clearTimeout(state.holdTimeout); state.holdTimeout = null; }
    state.activePointerId = null;
    if(state.stopTriggered) return; // already handled by hold

    if(state.phase === 'counting'){
      state.count++;
      spawnRipple(e.clientX, e.clientY);
    }
    removeRing(false);
  }

  function onPointerCancel(e){
    if(state.activePointerId !== e.pointerId) return;
    if(state.holdTimeout){ clearTimeout(state.holdTimeout); state.holdTimeout = null; }
    state.activePointerId = null;
    removeRing(true);
  }

  gameScreen.addEventListener('pointerdown', onPointerDown);
  gameScreen.addEventListener('pointerup', onPointerUp);
  gameScreen.addEventListener('pointercancel', onPointerCancel);
  gameScreen.addEventListener('pointerleave', onPointerCancel);
  gameScreen.addEventListener('contextmenu', e => e.preventDefault());

  function resetRoundVisuals(){
    numberDisplay.classList.remove('show');
    breathingCircle.classList.remove('show');
    glowCircle.classList.remove('show');
    messageDisplay.classList.remove('show');
    if(state.holdTimeout){ clearTimeout(state.holdTimeout); state.holdTimeout = null; }
    removeRing(true);
  }

  // ---------- Boot ----------
  setTimeout(() => showScreen('home'), 1800);
})();
</script>
</body>
</html>
